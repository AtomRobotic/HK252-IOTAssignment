<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Dashboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        .card {
            padding: 20px;
            border: 1px solid #ccc;
            margin: 10px;
            display: inline-block;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Hệ Thống IoT Giám Sát</h1>

    <div class="card">
        <h3>Nhiệt độ: <span id="temp">--</span> °C</h3>
        <h3>Độ ẩm: <span id="hum">--</span> %</h3>
        <h3>Ẩm đất: <span id="soil">--</span> %</h3>
    </div>

    <div class="card">
        <h3>Điều khiển thiết bị</h3>
        <button onclick="sendCmd(2, 1)">BẬT QUẠT</button>
        <button onclick="sendCmd(2, 0)">TẮT QUẠT</button>
    </div>
    <div class="card">
        <h3>Cấu hình Kết nối (Config)</h3>
        <input type="text" id="ssid" placeholder="Tên Wi-Fi (SSID)"><br><br>
        <input type="password" id="pass" placeholder="Mật khẩu Wi-Fi"><br><br>
        <input type="text" id="mqtt_server" placeholder="Máy chủ (VD: app.coreiot.io)"><br><br>
        <input type="number" id="mqtt_port" placeholder="Cổng MQTT (VD: 1883)" value="1883"><br><br>
        <input type="text" id="mqtt_token" placeholder="Device Token CoreIOT"><br><br>
        <button onclick="saveConfig()">LƯU VÀ KHỞI ĐỘNG LẠI</button>
    </div>

    <script src="/script.js"></script>
</body>

</html>

<script src="/script.js"></script>
</body>

</html>
